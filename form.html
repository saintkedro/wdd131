<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description" content="Submit your product review including rating, features, and feedback to help improve user experience.">
    <meta name="author" content="Kingsley Isong">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
  <header>
  <h1>Product Review</h1>
</header>
    <div class="container">

      <form class="review-form" method="get" action="review.html">

        <!-- Product Name -->
        <label for="product">Product Name*</label>
        <select id="product" name="product" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>

        <!-- Rating -->
        <label>Overall Rating*</label>
        <div class="rating">
          <label for="rating1">
            <input type="radio" id="rating1" name="rating" value="1" required>
            &star;
          </label>

          <label for="rating2">
            <input type="radio" id="rating2" name="rating" value="2" required>
            &star;&star;
          </label>

          <label for="rating3">
            <input type="radio" id="rating3" name="rating" value="3" required>
            &star;&star;&star;
          </label>

          <label for="rating4">
            <input type="radio" id="rating4" name="rating" value="4" required>
            &star;&star;&star;&star;
          </label>

          <label for="rating5">
            <input type="radio" id="rating5" name="rating" value="5" required>
            &star;&star;&star;&star;&star;
          </label>
        </div>

        <!-- Date -->
        <label for="installDate">Date of Installation*</label>
          <input type="date" id="installDate" name="installDate" required>

        <!-- Features -->
       
        <label>Which features did you find useful in the product?<span>(Check all that apply)*</span>
        </label>

      <div class="checkbox-group">
        <label for="durability"> 
          <input type="checkbox" id="durability" name="features" value="Durability"> Durability</label>

        <label for="easeOfUse">
          <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use"> Ease of Use</label>

        <label for="performance">
          <input type="checkbox" id="performance" name="features" value="Performance"> Performance</label>

        <label for="design">
          <input type="checkbox" id="design" name="features" value="Design"> Design</label>
      </div>

        <!-- Review -->
        <label for="review">Written Review <span>(Optional)</span></label>
        <textarea id="review" name="review" rows="4"></textarea>

        <!-- Name -->
        <label for="username">Your Name <span>(Optional)</span></label>
        <input type="text" id="username" name="username">

        <!-- Submit -->
        <input type="submit" value="Post Review">

      </form>
    

      <footer>
          <p> &copy; <span id="currentyear"></span> Kingsley E. Isong | Nigeria</p>
          <p>Last Modified: <span id="lastModified"></span></p>
      </footer>
    </div>
    

</body>
</html>
