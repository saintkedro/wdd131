<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <meta name="description" content="This activity's objective is to reduce page weight while maintaining clarity and functionality across screen sizes and viewports (the visible area of a web page).">
    <meta name="author" content="Kingsley Isong">
    <link rel="stylesheet" 
    href="styles/responsive-images.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
<main>
  <div class="hero">
    <picture>
      <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
      <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
      <img src="images/hero-small.webp" alt="Hero image showing Aba Nigeria Temple" width="1500" height="750">
    </picture>
  </div>
</main>
</body>
